x-app-environment: &app-environment
  APP_ENV: ${APP_ENV:-development}
  API_DOCS_ENABLED: ${API_DOCS_ENABLED:-false}
  DATABASE_URL: postgresql+psycopg://hatespeech:${POSTGRES_PASSWORD:-hatespeech}@postgres:5432/hatespeech
  ADMIN_TOKEN: ${ADMIN_TOKEN:-change-me}
  FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
  GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:3000/api/auth/google/callback}
  SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-hsr_session}
  SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN:-}
  SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
  SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-1209600}
  API_KEY_ENCRYPTION_KEY: ${API_KEY_ENCRYPTION_KEY:-}
  WORKER_STALE_AFTER_SECONDS: ${WORKER_STALE_AFTER_SECONDS:-900}
  RAG_EXECUTION_MODE: ${RAG_EXECUTION_MODE:-sequential}
  RAG_ITEM_CONCURRENCY: ${RAG_ITEM_CONCURRENCY:-4}
  RAG_EMBEDDING_CONCURRENCY: ${RAG_EMBEDDING_CONCURRENCY:-4}
  RAG_LLM_CONCURRENCY: ${RAG_LLM_CONCURRENCY:-2}
  RAG_ITEM_MAX_ATTEMPTS: ${RAG_ITEM_MAX_ATTEMPTS:-3}
  RAG_HEARTBEAT_INTERVAL_SECONDS: ${RAG_HEARTBEAT_INTERVAL_SECONDS:-30}
  RAG_SHUTDOWN_GRACE_SECONDS: ${RAG_SHUTDOWN_GRACE_SECONDS:-30}
  RAG_REQUEST_TIMEOUT_SECONDS: ${RAG_REQUEST_TIMEOUT_SECONDS:-30}
  PIPELINE_MODE: ${PIPELINE_MODE:-fake}
  YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
  LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
  LLM_MODEL: ${LLM_MODEL:-claude-haiku-4-5-20251001}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-upstage}
  EMBEDDING_MODEL: ${EMBEDDING_MODEL:-embedding}
  UPSTAGE_EMBEDDING_BASE_URL: ${UPSTAGE_EMBEDDING_BASE_URL:-https://api.upstage.ai/v1/embeddings}
  UPSTAGE_API_KEY: ${UPSTAGE_API_KEY:-}
  CHROMA_PERSIST_DIRECTORY: /data/chroma

services:
  frontend:
    build:
      context: ./frontend
      target: production
    depends_on:
      web:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hatespeech
      POSTGRES_USER: hatespeech
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hatespeech}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hatespeech -d hatespeech"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_data:/var/lib/postgresql/data

  init-volumes:
    build:
      context: .
      target: runtime
    user: root
    command: ["chown", "-R", "app:app", "/data/chroma"]
    volumes:
      - chroma_data:/data/chroma

  corpus:
    profiles: ["tools"]
    build:
      context: .
      target: runtime
    command: ["python", "-m", "scripts.bootstrap_corpus", "--persist-directory", "/data/chroma", "--reset"]
    environment:
      APP_ENV: development
      PIPELINE_MODE: fake
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-upstage}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-embedding}
      UPSTAGE_EMBEDDING_BASE_URL: ${UPSTAGE_EMBEDDING_BASE_URL:-https://api.upstage.ai/v1/embeddings}
      UPSTAGE_API_KEY: ${UPSTAGE_API_KEY:-}
      CHROMA_PERSIST_DIRECTORY: /data/chroma
    depends_on:
      init-volumes:
        condition: service_completed_successfully
    volumes:
      - chroma_data:/data/chroma
      - ./data/external:/app/data/external:ro

  migrate:
    build:
      context: .
      target: runtime
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+psycopg://hatespeech:${POSTGRES_PASSWORD:-hatespeech}@postgres:5432/hatespeech
    depends_on:
      postgres:
        condition: service_healthy
      init-volumes:
        condition: service_completed_successfully

  web:
    build:
      context: .
      target: runtime
    environment: *app-environment
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 12
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - chroma_data:/data/chroma:ro

  worker:
    build:
      context: .
      target: runtime
    command: ["python", "-m", "app.worker_main"]
    environment: *app-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - chroma_data:/data/chroma

volumes:
  postgres_data:
  chroma_data:
