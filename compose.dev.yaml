services:
  web:
    ports:
      - "${WEB_PORT:-8000}:8000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./app:/app/app
      - chroma_data:/data/chroma:ro
      - report_storage:/data/reports
  worker:
    volumes:
      - ./app:/app/app
      - chroma_data:/data/chroma
      - report_storage:/data/reports
  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
