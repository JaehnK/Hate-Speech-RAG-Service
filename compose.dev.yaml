services:
  frontend:
    build:
      target: development
    command: ["npm", "run", "dev"]
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 5s
      timeout: 3s
      retries: 12

  web:
    ports:
      - "${WEB_PORT:-8000}:8000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./app:/app/app
      - chroma_data:/data/chroma:ro
      - report_storage:/data/reports
  worker:
    volumes:
      - ./app:/app/app
      - chroma_data:/data/chroma
      - report_storage:/data/reports
  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
