services:
  test:
    build:
      context: .
      target: test
    environment:
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg://hatespeech:hatespeech@postgres-test:5432/hatespeech_test
    depends_on:
      postgres-test:
        condition: service_healthy
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hatespeech_test
      POSTGRES_USER: hatespeech
      POSTGRES_PASSWORD: hatespeech
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hatespeech -d hatespeech_test"]
      interval: 3s
      timeout: 3s
      retries: 10
