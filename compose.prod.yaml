services:
  frontend:
    restart: unless-stopped
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    ports:
      - "${FRONTEND_PORT:-3000}:8080"

  web:
    restart: unless-stopped
    environment:
      APP_ENV: production
      API_DOCS_ENABLED: "false"
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
  worker:
    restart: unless-stopped
    environment:
      APP_ENV: production
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
  migrate:
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
  postgres:
    restart: unless-stopped
